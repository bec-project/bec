name: Run pytest on plugin repositories
on: 
  workflow_call:
    inputs:
      BEC_WIDGETS_BRANCH:
        description: 'Branch for BEC Widgets'
        required: false
        default: 'main'
        type: string
      BEC_CORE_BRANCH:
        description: 'Branch for BEC Core'
        required: false
        default: 'main'
        type: string
      OPHYD_DEVICES_BRANCH:
        description: 'Branch for Ophyd Devices'
        required: false
        default: 'main'
        type: string
      
    secrets:
      GH_READ_TOKEN:
        required: true



jobs:
  plugin_repos:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash -el {0}

    env: 
      QTWEBENGINE_DISABLE_SANDBOX: 1
      QT_QPA_PLATFORM: "offscreen"

    strategy:
      matrix:
        beamline_repo: ${{ fromJSON(vars.BEAMLINE_REPO_NAMES) }}

    name: Plugin ${{ matrix.beamline_repo }}

    steps:
      - name: Checkout BEC Core
        uses: actions/checkout@v4
        with:
          repository: bec-project/bec
          ref: ${{ inputs.BEC_CORE_BRANCH }}

      - name: Install and test a BEC plugin repository
        uses: ./.github/actions/plugin_repo_tests
        with:
          BEC_CORE_BRANCH: ${{ inputs.BEC_CORE_BRANCH }}
          BEC_WIDGETS_BRANCH: ${{ inputs.BEC_WIDGETS_BRANCH }}
          OPHYD_DEVICES_BRANCH: ${{ inputs.OPHYD_DEVICES_BRANCH }}
          BEC_PLUGIN_REPO_URL: github.com/bec-project/${{ matrix.beamline_repo }}.git
          BEC_PLUGIN_REPO_NAME: ${{ matrix.beamline_repo }}
          GH_READ_TOKEN: ${{ secrets.GH_READ_TOKEN }}
          PYTHON_VERSION: '3.11'

      

    